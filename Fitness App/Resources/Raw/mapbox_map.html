<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!--MAPBOX_BUNDLE-->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0F1923;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }

        .user-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #2563EB;
            border: 3px solid white;
            box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.6);
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.6);
            }

            70% {
                box-shadow: 0 0 0 16px rgba(37, 99, 235, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);
            }
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        mapboxgl.accessToken = '__MAPBOX_TOKEN__';

        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/__START_STYLE__',
            center: [__START_LNG__, __START_LAT__],
            zoom: 15,
            attributionControl: false,
            logoPosition: 'bottom-left',
            fadeDuration: 0
        });

        var _currentStyle = '__START_STYLE__';
        var _is3D = false;
        var _lastUserLngLat = [__START_LNG__, __START_LAT__];
        var _lastHeadingDeg = null;
        var _plannedRouteCoords = [];
        var _plannedDestLng = null;
        var _plannedDestLat = null;
        var _pickListenersWired = false;

        map.dragRotate.disable();
        map.touchZoomRotate.disableRotation();

        var routeCoords = [];
        var _lastFollowCamMs = 0;
        var FOLLOW_CAM_INTERVAL_MS = 5000;

        function maybeFollowCamera(lng, lat) {
            var now = Date.now();
            if (now - _lastFollowCamMs < FOLLOW_CAM_INTERVAL_MS) return;
            _lastFollowCamMs = now;
            map.jumpTo({ center: [lng, lat], zoom: Math.max(map.getZoom(), 15) });
        }

        function projectLngLat(lng, lat, distanceMeters, bearingDeg) {
            var earthRadiusMeters = 6378137;
            var bearing = bearingDeg * Math.PI / 180;
            var latRad = lat * Math.PI / 180;
            var lngRad = lng * Math.PI / 180;
            var angularDistance = distanceMeters / earthRadiusMeters;
            var nextLat = Math.asin(
                Math.sin(latRad) * Math.cos(angularDistance) +
                Math.cos(latRad) * Math.sin(angularDistance) * Math.cos(bearing)
            );
            var nextLng = lngRad + Math.atan2(
                Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(latRad),
                Math.cos(angularDistance) - Math.sin(latRad) * Math.sin(nextLat)
            );
            return [nextLng * 180 / Math.PI, nextLat * 180 / Math.PI];
        }

        function createHeadingConePolygon(lng, lat, headingDeg, radiusMeters) {
            var spreadDegrees = 24;
            var coordinates = [[lng, lat]];
            for (var step = -2; step <= 2; step++) {
                coordinates.push(projectLngLat(lng, lat, radiusMeters, headingDeg + step * (spreadDegrees / 2)));
            }
            coordinates.push([lng, lat]);
            return coordinates;
        }

        function calculateConeRadius() {
            var zoom = map.getZoom();
            // Dynamic radius based on zoom: larger at lower zoom, smaller at higher zoom
            // Zoom 10 = ~100m, Zoom 15 = ~34m, Zoom 18 = ~15m
            var baseRadius = 34;
            var zoomFactor = Math.pow(2, 15 - zoom);
            return Math.max(15, Math.min(100, baseRadius * zoomFactor));
        }

        function ensureUserHeadingLayers() {
            // Pulse wave source
            if (!map.getSource('user-heading-pulse')) {
                map.addSource('user-heading-pulse', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: []
                    }
                });
            }

            // Main cone source
            if (!map.getSource('user-heading-source')) {
                map.addSource('user-heading-source', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features: []
                    }
                });
            }

            // Pulse wave layer (rendered first, behind main cone)
            if (!map.getLayer('user-heading-pulse')) {
                map.addLayer({
                    id: 'user-heading-pulse',
                    type: 'fill',
                    source: 'user-heading-pulse',
                    paint: {
                        'fill-color': '#60A5FA',
                        'fill-opacity': 0
                    }
                });
            }

            // Main cone fill
            if (!map.getLayer('user-heading-fill')) {
                map.addLayer({
                    id: 'user-heading-fill',
                    type: 'fill',
                    source: 'user-heading-source',
                    paint: {
                        'fill-color': '#60A5FA',
                        'fill-opacity': 0.22
                    }
                });
            }

            // Main cone outline
            if (!map.getLayer('user-heading-outline')) {
                map.addLayer({
                    id: 'user-heading-outline',
                    type: 'line',
                    source: 'user-heading-source',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': '#BFDBFE',
                        'line-width': 2,
                        'line-opacity': 0.85
                    }
                });
            }
        }

        var _pulseAnimationFrame = null;
        var _pulseStartTime = null;

        function setHeadingConeData(source, lng, lat, headingDeg, radiusMeters) {
            if (!source) return;
            source.setData({
                type: 'FeatureCollection',
                features: [{
                    type: 'Feature',
                    geometry: {
                        type: 'Polygon',
                        coordinates: [createHeadingConePolygon(lng, lat, headingDeg, radiusMeters)]
                    },
                    properties: {}
                }]
            });
        }

        function updateUserHeadingCone(lng, lat, headingDeg) {
            ensureUserHeadingLayers();
            var source = map.getSource('user-heading-source');
            var pulseSource = map.getSource('user-heading-pulse');
            if (!source) return;

            if (headingDeg == null || isNaN(Number(headingDeg))) {
                source.setData({
                    type: 'FeatureCollection',
                    features: []
                });
                if (pulseSource) {
                    pulseSource.setData({
                        type: 'FeatureCollection',
                        features: []
                    });
                }
                if (_pulseAnimationFrame) {
                    cancelAnimationFrame(_pulseAnimationFrame);
                    _pulseAnimationFrame = null;
                }
                _pulseStartTime = null;
                return;
            }

            var radius = calculateConeRadius();
            var headingNum = Number(headingDeg);

            setHeadingConeData(source, lng, lat, headingNum, radius);

            // Start pulse animation
            if (!_pulseStartTime) {
                _pulseStartTime = Date.now();
            }
            if (!_pulseAnimationFrame) {
                animatePulse();
            }
        }

        function animatePulse() {
            _pulseAnimationFrame = null;
            if (_lastHeadingDeg == null || !_lastUserLngLat || _lastUserLngLat.length < 2) {
                return;
            }

            var lng = _lastUserLngLat[0];
            var lat = _lastUserLngLat[1];
            var headingDeg = Number(_lastHeadingDeg);
            var baseRadius = calculateConeRadius();
            var pulseSource = map.getSource('user-heading-pulse');
            var source = map.getSource('user-heading-source');
            var pulseLayer = map.getLayer('user-heading-pulse');
            if (!pulseSource || !pulseLayer || !source) return;

            var pulseDuration = 2000; // 2 seconds per pulse
            var elapsed = (Date.now() - _pulseStartTime) % pulseDuration;
            var progress = elapsed / pulseDuration;

            // Pulse expands from 1x to 1.8x radius
            var pulseRadius = baseRadius * (1 + progress * 0.8);
            // Opacity fades from 0.18 to 0
            var pulseOpacity = 0.18 * (1 - progress);

            setHeadingConeData(source, lng, lat, headingDeg, baseRadius);
            setHeadingConeData(pulseSource, lng, lat, headingDeg, pulseRadius);

            map.setPaintProperty('user-heading-pulse', 'fill-opacity', pulseOpacity);

            _pulseAnimationFrame = requestAnimationFrame(function() {
                animatePulse();
            });
        }

        var trackingInitialized = false;
        var pendingStartTracking = false;
        var pickMode = false;

        function clearLiveRouteGraphics() {
            routeCoords = [];
            _lastFollowCamMs = 0;
            if (!trackingInitialized) return;

            map.getSource('live-route').setData({
                type: 'Feature',
                geometry: { type: 'LineString', coordinates: [] }
            });

            map.getSource('start-dot').setData({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [] }
            });

            if (map.getLayer('end-dot')) map.removeLayer('end-dot');
            if (map.getSource('end-dot')) map.removeSource('end-dot');
        }

        function startTracking() {
            if (!trackingInitialized) {
                pendingStartTracking = true;
                return;
            }
            clearLiveRouteGraphics();
        }

        function resetTracking() {
            startTracking();
        }

        function clearPlannedRoute() {
            try {
                if (!trackingInitialized) return;
                _plannedRouteCoords = [];
                _plannedDestLng = null;
                _plannedDestLat = null;
                map.getSource('planned-route').setData({
                    type: 'Feature',
                    geometry: { type: 'LineString', coordinates: [] }
                });
                map.getSource('destination').setData({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [] }
                });
            } catch (e) { }
        }

        var _pendingPlannedBase64 = null;
        var _pendingPlannedDestLng = 0;
        var _pendingPlannedDestLat = 0;

        function applyPlannedRouteCoords(coords, destLng, destLat) {
            if (!coords || coords.length < 2) return;
            _plannedRouteCoords = coords.slice();
            _plannedDestLng = destLng;
            _plannedDestLat = destLat;
            map.getSource('planned-route').setData({
                type: 'Feature',
                geometry: { type: 'LineString', coordinates: coords }
            });
            map.getSource('destination').setData({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [destLng, destLat] }
            });
            var b = new mapboxgl.LngLatBounds(coords[0], coords[0]);
            for (var i = 1; i < coords.length; i++) b.extend(coords[i]);
            map.fitBounds(b, { padding: 70, duration: 350 });
        }

        function setPlannedRouteFromBase64(b64, destLng, destLat) {
            if (!b64) return;
            try {
                var json = atob(b64);
                var coords = JSON.parse(json);
                if (!coords || coords.length < 2) return;

                if (!trackingInitialized) {
                    _pendingPlannedBase64 = b64;
                    _pendingPlannedDestLng = destLng;
                    _pendingPlannedDestLat = destLat;
                    return;
                }
                applyPlannedRouteCoords(coords, destLng, destLat);
            } catch (e) {
            }
        }

        function flushPendingPlannedRoute() {
            if (!_pendingPlannedBase64 || !trackingInitialized) return;
            var b64 = _pendingPlannedBase64;
            var lng = _pendingPlannedDestLng;
            var lat = _pendingPlannedDestLat;
            _pendingPlannedBase64 = null;
            try {
                var json = atob(b64);
                var coords = JSON.parse(json);
                applyPlannedRouteCoords(coords, lng, lat);
            } catch (e) { }
        }

        function setDestinationPickMode(enabled) {
            pickMode = !!enabled;
        }

        function wirePickListeners() {
            if (_pickListenersWired) return;
            _pickListenersWired = true;
            var _longPressTimer = null;
            var _touchMoved = false;

            map.on('touchstart', function (e) {
                if (!pickMode || (e.originalEvent && e.originalEvent.touches && e.originalEvent.touches.length !== 1)) return;
                _touchMoved = false;
                clearTimeout(_longPressTimer);
                var lngLat = e.lngLat;
                _longPressTimer = setTimeout(function () {
                    if (_touchMoved || !pickMode) return;
                    window.location.hash = 'dest=' + lngLat.lng + ',' + lngLat.lat;
                }, 480);
            });

            map.on('touchmove', function () {
                _touchMoved = true;
                clearTimeout(_longPressTimer);
            });

            map.on('touchend', function () {
                clearTimeout(_longPressTimer);
            });

            map.on('touchcancel', function () {
                clearTimeout(_longPressTimer);
            });

            map.on('contextmenu', function (e) {
                if (!pickMode) return;
                e.preventDefault();
                window.location.hash = 'dest=' + e.lngLat.lng + ',' + e.lngLat.lat;
            });
        }

        function ensurePlannedRouteLayers() {
            if (!map.getSource('planned-route')) {
                map.addSource('planned-route', {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } }
                });
            }

            if (!map.getLayer('planned-route-outline')) {
                map.addLayer({
                    id: 'planned-route-outline',
                    type: 'line',
                    source: 'planned-route',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': '#2B1106',
                        'line-width': 11,
                        'line-opacity': 0.94
                    }
                });
            }

            if (!map.getLayer('planned-route')) {
                map.addLayer({
                    id: 'planned-route',
                    type: 'line',
                    source: 'planned-route',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': '#FC5200',
                        'line-width': 6.5,
                        'line-opacity': 0.96
                    }
                });
            }

            if (!map.getSource('destination')) {
                map.addSource('destination', {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: { type: 'Point', coordinates: [] } }
                });
            }

            if (!map.getLayer('destination')) {
                map.addLayer({
                    id: 'destination',
                    type: 'circle',
                    source: 'destination',
                    paint: {
                        'circle-radius': 9,
                        'circle-color': '#FC5200',
                        'circle-stroke-width': 3,
                        'circle-stroke-color': '#FFF7ED'
                    }
                });
            }
        }

        function ensureLiveRouteLayers() {
            if (!map.getSource('live-route')) {
                map.addSource('live-route', {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } }
                });
            }

            if (!map.getLayer('live-route-glow')) {
                map.addLayer({
                    id: 'live-route-glow',
                    type: 'line',
                    source: 'live-route',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': '#2B1106',
                        'line-width': 12,
                        'line-opacity': 0.96
                    }
                });
            }

            if (!map.getLayer('live-route')) {
                map.addLayer({
                    id: 'live-route',
                    type: 'line',
                    source: 'live-route',
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: {
                        'line-color': '#FC5200',
                        'line-width': 7,
                        'line-opacity': 0.98
                    }
                });
            }
        }

        function ensureStartDotLayer() {
            if (!map.getSource('start-dot')) {
                map.addSource('start-dot', {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: { type: 'Point', coordinates: [] } }
                });
            }

            if (!map.getLayer('start-dot')) {
                map.addLayer({
                    id: 'start-dot',
                    type: 'circle',
                    source: 'start-dot',
                    paint: {
                        'circle-radius': 9,
                        'circle-color': '#00C853',
                        'circle-stroke-width': 3,
                        'circle-stroke-color': '#FFFFFF'
                    }
                });
            }
        }

        function restoreMapStateAfterStyleLoad() {
            ensureUserHeadingLayers();
            ensurePlannedRouteLayers();
            ensureLiveRouteLayers();
            ensureStartDotLayer();

            if (_lastUserLngLat && _lastUserLngLat.length >= 2) {
                userMarker.setLngLat(_lastUserLngLat);
                updateUserHeadingCone(_lastUserLngLat[0], _lastUserLngLat[1], _lastHeadingDeg);
            }

            if (_plannedRouteCoords && _plannedRouteCoords.length > 1 && _plannedDestLng != null && _plannedDestLat != null) {
                map.getSource('planned-route').setData({
                    type: 'Feature',
                    geometry: { type: 'LineString', coordinates: _plannedRouteCoords }
                });
                map.getSource('destination').setData({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [_plannedDestLng, _plannedDestLat] }
                });
            }

            if (routeCoords && routeCoords.length > 0) {
                map.getSource('live-route').setData({
                    type: 'Feature',
                    geometry: { type: 'LineString', coordinates: routeCoords }
                });
                map.getSource('start-dot').setData({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: routeCoords[0] }
                });
            }

            if (_is3D) {
                if (!map.getSource('mapbox-dem')) {
                    map.addSource('mapbox-dem', {
                        type: 'raster-dem',
                        url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
                        tileSize: 512
                    });
                }
                map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
            }
        }

        map.on('load', () => {
            restoreMapStateAfterStyleLoad();

            trackingInitialized = true;
            wirePickListeners();
            flushPendingPlannedRoute();

            if (pendingStartTracking) {
                pendingStartTracking = false;
                clearLiveRouteGraphics();
            }
            try { window.location.href = 'https://fitnessapp.local/map-ready'; } catch (e) { }
        });

        map.on('style.load', function () {
            if (!trackingInitialized) return;
            restoreMapStateAfterStyleLoad();
        });

        window.addEventListener('resize', () => {
            map.resize();
        });

        var markerEl = document.createElement('div');
        markerEl.className = 'user-marker';

        var userMarker = new mapboxgl.Marker({ element: markerEl, anchor: 'center' })
            .setLngLat([__START_LNG__, __START_LAT__])
            .addTo(map);

        function centerOnUser(lng, lat) {
            syncUserLocation(lng, lat, null, true);
        }

        function updateUserLocation(lng, lat) {
            syncUserLocation(lng, lat, null, true);
        }

        function syncUserLocation(lng, lat, headingDeg, followCamera) {
            _lastUserLngLat = [lng, lat];
            if (headingDeg != null && !isNaN(Number(headingDeg))) {
                _lastHeadingDeg = Number(headingDeg);
            }
            userMarker.setLngLat([lng, lat]);
            updateUserHeadingCone(lng, lat, _lastHeadingDeg);
            if (followCamera) {
                map.easeTo({ center: [lng, lat], zoom: Math.max(map.getZoom(), 15), duration: 300 });
            }
        }

        function changeMapStyle(styleString) {
            if (!styleString || styleString === _currentStyle) return;
            _currentStyle = styleString;
            map.setStyle('mapbox://styles/mapbox/' + styleString);
        }

        function toggle3D(enable) {
            _is3D = !!enable;
            if (_is3D) {
                if (!map.getSource('mapbox-dem')) {
                    map.addSource('mapbox-dem', {
                        type: 'raster-dem',
                        url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
                        tileSize: 512
                    });
                }
                map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
                map.easeTo({ pitch: 60, duration: 700 });
            } else {
                map.setTerrain(null);
                map.easeTo({ pitch: 0, duration: 700 });
            }
        }

        var ROUTE_COORDS_MAX_RENDER = 4500;

        function decimateRouteCoordsInPlace() {
            var n = routeCoords.length;
            if (n <= ROUTE_COORDS_MAX_RENDER) return;
            var target = Math.floor(ROUTE_COORDS_MAX_RENDER * 0.85);
            var step = Math.max(2, Math.ceil(n / target));
            var out = [routeCoords[0]];
            for (var i = step; i < n - 1; i += step) {
                out.push(routeCoords[i]);
            }
            if (n > 1) out.push(routeCoords[n - 1]);
            routeCoords = out;
        }

        function addCoordinatesBatch(coordsJson) {
            if (!trackingInitialized) return;
            try {
                var arr = JSON.parse(coordsJson);
                applyCoordinatePoints(arr);
            } catch (e) {
            }
        }

        function addCoordinatesBatchFromBase64(b64) {
            if (!trackingInitialized || !b64) return;
            try {
                var json = atob(b64);
                var arr = JSON.parse(json);
                applyCoordinatePoints(arr);
            } catch (e) {
            }
        }

        function applyCoordinatePoints(arr) {
            if (!arr || arr.length === 0) return;

            var wasEmpty = routeCoords.length === 0;
            for (var i = 0; i < arr.length; i++) {
                routeCoords.push(arr[i]);
            }
            decimateRouteCoordsInPlace();

            map.getSource('live-route').setData({
                type: 'Feature',
                geometry: { type: 'LineString', coordinates: routeCoords }
            });

            if (wasEmpty && routeCoords.length > 0) {
                var c0 = routeCoords[0];
                map.getSource('start-dot').setData({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: c0 }
                });
            }

            var last = routeCoords[routeCoords.length - 1];
            userMarker.setLngLat(last);
            maybeFollowCamera(last[0], last[1]);
        }

        function addCoordinate(lng, lat) {
            addCoordinatesBatch(JSON.stringify([[lng, lat]]));
        }

        function showRecordedRouteFromBase64(b64, routeColor) {
            if (!b64 || !trackingInitialized) return;
            try {
                var json = atob(b64);
                var coords = JSON.parse(json);
                if (!coords || coords.length < 1) return;

                routeCoords = coords.slice();
                if (markerEl) markerEl.style.display = 'none';

                if (routeColor) {
                    try { map.setPaintProperty('live-route', 'line-color', routeColor); } catch (e) { }
                    try { map.setPaintProperty('live-route-glow', 'line-color', routeColor); } catch (e) { }
                }

                map.getSource('live-route').setData({
                    type: 'Feature',
                    geometry: { type: 'LineString', coordinates: routeCoords }
                });

                map.getSource('start-dot').setData({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: routeCoords[0] }
                });

                var endCoord = routeCoords[routeCoords.length - 1];
                if (!map.getSource('end-dot')) {
                    map.addSource('end-dot', {
                        type: 'geojson',
                        data: {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: endCoord }
                        }
                    });
                    map.addLayer({
                        id: 'end-dot',
                        type: 'circle',
                        source: 'end-dot',
                        paint: {
                            'circle-radius': 9,
                            'circle-color': '#FF0000',
                            'circle-stroke-width': 3,
                            'circle-stroke-color': '#FFFFFF'
                        }
                    });
                } else {
                    map.getSource('end-dot').setData({
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: endCoord }
                    });
                }

                if (routeCoords.length > 1) {
                    var bounds = routeCoords.reduce(function (b, coord) {
                        return b.extend(coord);
                    }, new mapboxgl.LngLatBounds(routeCoords[0], routeCoords[0]));
                    map.fitBounds(bounds, { padding: 80, duration: 400, maxZoom: 16 });
                } else {
                    map.easeTo({ center: routeCoords[0], zoom: 16, duration: 300 });
                }
            } catch (e) {
            }
        }

        function stopTracking(lng, lat) {
            if (!trackingInitialized || routeCoords.length === 0) return;

            if (!map.getSource('end-dot')) {
                map.addSource('end-dot', {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [lng, lat] }
                    }
                });
                map.addLayer({
                    id: 'end-dot',
                    type: 'circle',
                    source: 'end-dot',
                    paint: {
                        'circle-radius': 9,
                        'circle-color': '#FF0000',
                        'circle-stroke-width': 3,
                        'circle-stroke-color': '#FFFFFF'
                    }
                });
            } else {
                map.getSource('end-dot').setData({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [lng, lat] }
                });
            }

            if (routeCoords.length > 1) {
                var bounds = routeCoords.reduce(function (b, coord) {
                    return b.extend(coord);
                }, new mapboxgl.LngLatBounds(routeCoords[0], routeCoords[0]));

                map.fitBounds(bounds, { padding: 80, duration: 400 });
            }
        }
    </script>
